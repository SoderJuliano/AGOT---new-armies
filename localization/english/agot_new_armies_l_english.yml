l_english:
 agot_flame_archers_essos:0 "Arqueiros de Chamas de Essos"
 agot_flame_archers_essos_flavor:0 "Arqueiros e alquimistas de Essos que usam misturas incendiárias instáveis. Mortais contra infantaria leve, mas perigosos até para seus próprios aliados quando o fogo sai do controle."

 agot_mountain_clans:0 "Clãs das Montanhas"
 agot_mountain_clans_flavor:0 "Guerreiros irregulares das Montanhas da Lua. Brutais em terreno acidentado, porém pouco disciplinados em batalhas longas em campo aberto."

 agot_ironborn_assault_divers:0 "Mergulhadores de Assalto"
 agot_ironborn_assault_divers_flavor:0 "Sabotadores das Ilhas de Ferro especializados em incursões anfíbias, ataques de surpresa e desorganização inimiga."

 agot_second_sons:0 "Segundos Filhos"
 agot_second_sons_flavor:0 "Companhia mercenária veterana de Essos: eficiente em quase qualquer terreno, mas sua lealdade depende do pagamento em ouro."

 agot_monolith_warriors:0 "Guerreiros Monólito"
 agot_monolith_warriors_flavor:0 "Infantaria pesada da Casa Monólito. Avançam como muralhas vivas, absorvem impactos brutais e mantêm a linha quando tudo ao redor desaba."

 agot_brotherhood_without_banners:0 "Irmandade Sem Bandeiras"
 agot_brotherhood_without_banners_flavor:0 "Combatentes irregulares que abandonaram lealdades feudais para lutar pelo povo comum. Especialistas em floresta, emboscada e guerra de atrito."

 agot_flame_archers_unstable_fire:0 "Fogo Instável"
 agot_flame_archers_unstable_fire_desc:0 "As misturas incendiárias explodiram cedo demais e desorganizaram a linha de frente."

 agot_flame_archers_rhllor_zeal:0 "Zelo de R'hllor"
 agot_flame_archers_rhllor_zeal_desc:0 "Uma saraivada de fogo bem coordenada elevou o moral e a letalidade dos arqueiros."

 agot_second_sons_unpaid:0 "Lealdade ao Ouro Quebrada"
 agot_second_sons_unpaid_desc:0 "Sem pagamento, os Segundos Filhos lutam sem motivação e exigem mais recursos para permanecer no exército."

 agot_monolith_anchor:0 "Inabaláveis como a Rocha"
 agot_monolith_anchor_desc:0 "A formação monolítica fecha as fileiras e se torna mais resistente conforme o combate se estende."

 agot_monolith_hammer_impact:0 "Impacto de Martelo"
 agot_monolith_hammer_impact_desc:0 "No momento certo, os Guerreiros Monólito descarregam um golpe devastador contra alvos blindados."

 agot_bwb_flaming_swords:0 "Espadas Flamejantes"
 agot_bwb_flaming_swords_desc:0 "A fé e o fervor da Irmandade inflamam o combate, aumentando o dano causado por um breve período."

 agot_bwb_brought_back:0 "Aquele que Foi Trazido de Volta"
 agot_bwb_brought_back_desc:0 "Contra todas as probabilidades, a Irmandade recompõe sua linha e mantém mais guerreiros de pé após o choque inicial."

 agot_bwb_unruly_company:0 "Justiça dos Sem Bandeiras"
 agot_bwb_unruly_company_desc:0 "Longe da guerra justa, a Irmandade se torna difícil de controlar e menos confiável para campanhas convencionais."

 agot_new_armies_open_contracts_decision:0 "Contratar Companhias Especiais"
 agot_new_armies_open_contracts_decision_desc:0 "Abra uma lista própria de contratação para chamar as novas companhias especiais do submod sem depender da aba vanilla de mercenários."
 agot_new_armies_open_contracts_decision_tooltip:0 "Escolha uma companhia especial e pague o contrato inicial para adicioná-la diretamente ao seu exército."
 agot_new_armies_open_contracts_decision_confirm:0 "Ver companhias"

 agot_new_armies_search_companies_decision:0 "Buscar Companhias Especiais de Guerra"
 agot_new_armies_search_companies_decision_desc:0 "Despache emissários para localizar as companhias especiais de guerra disponíveis. Eles retornam em um dia com a lista de grupos prontos para contratação."
 agot_new_armies_search_companies_decision_tooltip:0 "Um dia depois você receberá a lista das companhias disponíveis e poderá contratá-las por ouro. Pode ser usada novamente após 30 dias."
 agot_new_armies_search_companies_decision_confirm:0 "Enviar Emissários"

 agot_new_armies.0200.t:0 "Companhias de Guerra Encontradas"
 agot_new_armies.0200.desc:0 "Seus emissários localizaram doze companhias especiais prontas para contrato de 3 anos. O ouro será descontado imediatamente. As tropas poderão ser erguidas pela aba Militar. Após 3 anos o contrato expira e o regimento é dissolvido.\n\nAs mesmas companhias também estão disponíveis na aba Mercenários para contratação pelo sistema padrão."
 agot_new_armies.0200.a:0 "Contratar Arqueiros de Chamas de Essos — 900 homens (450 ouro)"
 agot_new_armies.0200.b:0 "Contratar Clãs das Montanhas — 1.200 homens (500 ouro)"
 agot_new_armies.0200.c:0 "Contratar Mergulhadores de Assalto — 2.500 homens (1.100 ouro)"
 agot_new_armies.0200.d:0 "Contratar Segundos Filhos — 6.000 homens (2.500 ouro)"
 agot_new_armies.0200.e:0 "Contratar Guerreiros Monólito — 1.000 homens (600 ouro)"
 agot_new_armies.0200.f:0 "Contratar Irmandade Sem Bandeiras — 250 homens (150 ouro)"
 agot_new_armies.0200.g:0 "Fechar (usar aba Mercenários)"

 agot_new_armies.0100.t:0 "Companhias Especiais Disponíveis"
 agot_new_armies.0100.desc:0 "As companhias deste submod agora podem ser contratadas por uma interface própria. Cada contrato adiciona a tropa diretamente aos seus Homens-de-Armas e evita a dependência da aba padrão de mercenários."
 agot_new_armies.0100.a:0 "Contratar Arqueiros de Chamas de Essos (900 homens) - 450 ouro"
 agot_new_armies.0100.b:0 "Contratar Clãs das Montanhas (1200 homens) - 500 ouro"
 agot_new_armies.0100.c:0 "Contratar Mergulhadores de Assalto (2500 homens) - 1100 ouro"
 agot_new_armies.0100.d:0 "Contratar Segundos Filhos (6000 homens) - 2500 ouro"
 agot_new_armies.0100.e:0 "Contratar Guerreiros Monólito (1000 homens) - 600 ouro"
 agot_new_armies.0100.f:0 "Contratar Irmandade Sem Bandeiras (250 homens) - 150 ouro"
 agot_new_armies.0100.g:0 "Fechar"

 agot_new_armies.0101.t:0 "Novas Companhias Disponíveis"
 agot_new_armies.0101.desc:0 "As tropas especiais do submod estão disponíveis. Você pode contratá-las pela interface própria agora ou recrutá-las diretamente no menu de Homens-de-Armas."
 agot_new_armies.0101.a:0 "Abrir contratos"
 agot_new_armies.0101.b:0 "Não mostrar novamente"

