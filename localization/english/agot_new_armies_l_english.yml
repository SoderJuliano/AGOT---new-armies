 # ============ WAVE 2 — MAA Names & Flavors ============

 agot_exercito_de_pobres:0 "Exército dos Pobres"
 agot_exercito_de_pobres_flavor:0 "Desesperados, camponeses famintos e homens quebrados que empunham foices, paus e o que encontrarem. São milhares — e morrem como moscas. Mas sua maré de corpos pode afogar qualquer formação."

 agot_cavalaria_pesada_estrangeira1:0 "Lanceiros de Volantis"
 agot_cavalaria_pesada_estrangeira1_flavor:0 "Cavalaria pesada recrutada entre exilados e sellswords de Volantis. Seus cavalos blindados e lanças longas perfuram qualquer formação com cargas devastadoras."

 agot_cavalaria_pesada_estrangeira2:0 "Catafractos de Nova Ghis"
 agot_cavalaria_pesada_estrangeira2_flavor:0 "Guerreiros blindados de Nova Ghis, montados em cavalos de guerra cobertos por escamas de bronze. Lentos mas quase indestrutíveis em combate direto."

 agot_cavalaria_pesada_estrangeira3:0 "Cavaleiros do Sangue de Qarth"
 agot_cavalaria_pesada_estrangeira3_flavor:0 "Mercenários de elite de Qarth, conhecidos por suas armaduras de seda reforçada e lâminas curvas. Rápidos e letais em perseguição, não deixam ninguém escapar."

 agot_cavalaria_pesada_estrangeira4:0 "Couraceiros de Yi Ti"
 agot_cavalaria_pesada_estrangeira4_flavor:0 "A elite blindada do distante Yi Ti. Poucos em número, mas cada cavaleiro vale por dez. Armaduras lacadas de ouro e vermelho, impenetráveis."

 agot_abridor_portoes_estrangeiro:0 "Abridores de Portões"
 agot_abridor_portoes_estrangeiro_flavor:0 "Engenheiros de assédio estrangeiros especializados em derrubar muralhas e portões. Carregam aríetes, engenhos de sapa e sabem onde golpear para que tudo desabe."

